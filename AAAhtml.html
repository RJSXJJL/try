<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>tirlr</title>
   
    <style>
    
    
        *{
        font-family: "ct", sans-serif;
        }
   
        body {
    background-image: url("./横屏背景图.jpg");
    background-size: cover;        /* 铺满整个屏幕，保持比例 */
    background-position: center;   /* 图片居中 */
    background-attachment: fixed;  /* 固定背景，滚动时不动 */
    background-repeat: no-repeat;  /* 不重复 */
      }  
      
      .图标{
         z-index: 9999;
position: fixed; }
      
        .dock{
            position: fixed;
            left: 5px;
            }
       
       .dock img{
           left: 15px;}
       
       
        .baise{
            position: fixed;
            top: 210px;
            left: 33px;
            width: 51px;
            border-radius: 22px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            }
        .maojinshui{
               position: absolute;
               transform: rotate(90deg);
               left: 260px;   /*看似是调整左右, 实际上他是调整上下的*/
               top: 15px;
             }
        
        
           .meizhao img {
               transform: rotate(90deg);
               position: fixed;
               top: 380px;
               width: 300px;
               left: 67px;}
               
           .maojinshui {
    font-family: "ct", sans-serif;
}
        .jianjie{
               transform: rotate(90deg);
               position: absolute;
               top: 20px;
               left: 100px;}
            
        span{
            color: red;
            }
   </style>
</head>
<body>
    <div class="dock">
         <img class="baise" src="白色.jpg">$
    </div>
    
    <img class="图标"src="测试用图标.jpg"/>

<p class="jianjie">暴力、<span>色慾</span>、貪婪交織<br>毛全水是罪惡化身 雙<br>手沾滿鮮血
惡行昭彰<br>天理難容 殘暴肆虐<br>無惡不作
燒殺搶掠<br>強霸無底線 良知泯滅<br><span>生的猥瑣, 死得其所</span><p>
